server {
    listen 80;
    server_name activity.northbkk.ac.th;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name activity.northbkk.ac.th;

    ssl_certificate     /etc/letsencrypt/live/activity.northbkk.ac.th/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/activity.northbkk.ac.th/privkey.pem;

    # Thumbnail static files (serve โดย Nginx โดยตรง — เร็วกว่าผ่าน Node)
    location /thumbnails/ {
        alias /var/www/activity/public/thumbnails/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Node.js app → port 5533
    location / {
        proxy_pass         http://127.0.0.1:5533;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }
}
